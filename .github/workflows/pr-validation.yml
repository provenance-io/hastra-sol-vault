name: PR Validation

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    types: [ opened, reopened, synchronize ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libudev-dev llvm libclang-dev \
          protobuf-compiler libssl-dev

    - uses: solana-developers/github-actions/extract-versions@v0.2.10
      id: versions

    - uses: solana-developers/github-actions/setup-all@v0.2.10
      with:
        solana_version: ${{ steps.versions.outputs.solana_version }}
        anchor_version: ${{ steps.versions.outputs.anchor_version }}

    - name: Cache Cargo registry and git sources
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: cargo-${{ runner.os }}-

    - name: Cache yarn dependencies
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: yarn

    - name: Install yarn dependencies
      run: yarn install --frozen-lockfile

    - name: Sync Anchor program IDs to deploy keypairs
      run: anchor keys sync

    # Ensure SBF platform-tools exist (avoids anchor "os error 2" from missing SDK).
    - name: Install SBF platform tools
      run: cargo build-sbf --force-tools-install --manifest-path programs/vault-mint/Cargo.toml

    - name: Anchor build (testing)
      run: anchor build -- --features testing

    - name: Setup solana node
      run: |
        solana-test-validator --reset &
        echo "VALIDATOR_PID=$!" >> $GITHUB_ENV
        sleep 5

        mkdir -p ~/.config/solana/
        solana-keygen new --no-passphrase --outfile ~/.config/solana/hastra-localnet-id.json
        solana config set --url l
        solana config set --keypair ~/.config/solana/hastra-localnet-id.json
        solana airdrop 1000

    - name: Anchor test
      run: anchor test --skip-local-validator --skip-build

    - name: Stop local validator
      if: always()
      run: kill ${VALIDATOR_PID} 2>/dev/null || true

    # vault_stake has `idl-build = ["testing"]` so the IDL generated during the
    # testing build includes set_price_for_testing. Rebuild without the feature
    # to produce the production IDL and binary (default pool-prime).
    - name: Anchor build vault_stake (production, PRIME)
      run: anchor build --program-name vault_stake

    - name: Copy pool production binaries
      run: |
        mkdir -p artifacts
        cp target/deploy/vault_stake.so artifacts/vault_stake_prime.so
        anchor build --program-name vault_stake -- --no-default-features --features pool-auto
        cp target/deploy/vault_stake.so artifacts/vault_stake_auto.so
        anchor build --program-name vault_stake -- --no-default-features --features pool-smb
        cp target/deploy/vault_stake.so artifacts/vault_stake_smb.so

    - name: Generate checksums
      run: |
        sha256sum target/deploy/vault_mint.so      > artifacts/checksums.txt
        sha256sum artifacts/vault_stake_prime.so >> artifacts/checksums.txt
        sha256sum artifacts/vault_stake_auto.so  >> artifacts/checksums.txt
        sha256sum artifacts/vault_stake_smb.so   >> artifacts/checksums.txt
        sha256sum target/idl/vault_mint.json     >> artifacts/checksums.txt
        sha256sum target/idl/vault_stake.json    >> artifacts/checksums.txt
        sha256sum target/types/vault_mint.ts     >> artifacts/checksums.txt
        sha256sum target/types/vault_stake.ts    >> artifacts/checksums.txt
        cat artifacts/checksums.txt

    - name: Upload production program artifacts
      uses: actions/upload-artifact@v4
      with:
        name: program-builds-pr-${{ github.event.pull_request.number || github.run_id }}
        retention-days: 14
        path: |
          target/deploy/vault_mint.so
          artifacts/vault_stake_prime.so
          artifacts/vault_stake_auto.so
          artifacts/vault_stake_smb.so
          target/idl/vault_mint.json
          target/idl/vault_stake.json
          target/types/vault_mint.ts
          target/types/vault_stake.ts
          artifacts/checksums.txt
