name: PR Validation

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    types: [ opened, reopened, synchronize ]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AGAVE_BIN: ${{ env.HOME }}/.local/share/solana/install/active_release/bin

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libudev-dev llvm libclang-dev \
          protobuf-compiler libssl-dev

    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - uses: Swatinem/rust-cache@v2
      with:
        save-if: ${{ github.ref == 'refs/heads/main' }}

    # Install Anza Solana first; platform-tools must ship rustc >= 1.82 for indexmap 2.12+.
    - name: Install Solana CLI
      run: |
        sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
        AGAVE_BIN="$HOME/.local/share/solana/install/active_release/bin"
        echo "$AGAVE_BIN" >> $GITHUB_PATH
        # GITHUB_PATH applies on the next step; export for commands in this step.
        export PATH="$AGAVE_BIN:$PATH"
        solana --version
        cargo-build-sbf --version

    - name: Install avm
      run: cargo install --git https://github.com/coral-xyz/anchor avm --force

    - name: Install Anchor
      run: |
        anchor_version=$(cat Anchor.toml | grep anchor_version | awk '{print $NF}' | tr -d '"')
        avm install ${anchor_version}
        avm use ${anchor_version}

    # avm prepends Anchor's bundled Solana (rustc 1.79 SBF tools). Prefer Anza install.
    - name: Prefer Anza Solana platform tools on PATH
      run: |
        AGAVE_BIN="$HOME/.local/share/solana/install/active_release/bin"
        echo "$AGAVE_BIN" >> $GITHUB_PATH
        export PATH="$AGAVE_BIN:$PATH"
        which cargo-build-sbf
        cargo-build-sbf --version

    - name: Install yarn dependencies
      run: yarn install --frozen-lockfile

    - name: Sync Anchor program IDs to deploy keypairs
      run: anchor keys sync

    - name: Anchor build (testing)
      env:
        PATH: ${{ env.AGAVE_BIN }}:${{ env.PATH }}
      run: anchor build -- --features testing

    - name: Setup solana node
      env:
        PATH: ${{ env.AGAVE_BIN }}:${{ env.PATH }}
      run: |
        solana-test-validator --reset &
        echo "VALIDATOR_PID=$!" >> $GITHUB_ENV
        sleep 5

        mkdir -p ~/.config/solana/
        solana-keygen new --no-passphrase --outfile ~/.config/solana/hastra-localnet-id.json
        solana config set --url l
        solana config set --keypair ~/.config/solana/hastra-localnet-id.json
        solana airdrop 1000

    - name: Anchor test
      run: anchor test --skip-local-validator --skip-build

    - name: Stop local validator
      run: kill ${VALIDATOR_PID}

    - name: Anchor build vault_stake (production)
      env:
        PATH: ${{ env.AGAVE_BIN }}:${{ env.PATH }}
      run: anchor build --program-name vault_stake

    - name: Upload production program artifacts
      uses: actions/upload-artifact@v4
      with:
        name: program-builds-pr-${{ github.event.pull_request.number || github.run_id }}
        retention-days: 14
        path: |
          target/deploy/vault_mint.so
          target/deploy/vault_stake.so
          target/idl/vault_mint.json
          target/idl/vault_stake.json
          target/types/vault_mint.ts
          target/types/vault_stake.ts
