name: PR Validation

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
    types: [ opened, reopened, synchronize ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          libudev-dev llvm libclang-dev \
          protobuf-compiler libssl-dev

    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy

    - uses: Swatinem/rust-cache@v2
      with:
        save-if: ${{ github.ref == 'refs/heads/main' }}

    - name: Install Solana CLI
      run: |
        sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
        echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

    - name: Install Anchor (avm)
      run: |
        cargo install --git https://github.com/coral-xyz/anchor avm --force
        anchor_version=$(grep '^anchor_version' Anchor.toml | awk '{print $NF}' | tr -d '"')
        avm install "${anchor_version}"
        avm use "${anchor_version}"
        echo "$HOME/.avm/bin" >> $GITHUB_PATH

    - name: Verify toolchain on PATH
      run: |
        export PATH="$HOME/.local/share/solana/install/active_release/bin:$HOME/.avm/bin:$PATH"
        echo "AGAVE_BIN=$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_ENV
        echo "TOOLCHAIN_PATH=$HOME/.local/share/solana/install/active_release/bin:$HOME/.avm/bin" >> $GITHUB_ENV
        solana --version
        anchor --version
        cargo-build-sbf --version

    - name: Install yarn dependencies
      run: yarn install --frozen-lockfile

    - name: Sync Anchor program IDs to deploy keypairs
      env:
        PATH: ${{ env.TOOLCHAIN_PATH }}:${{ env.PATH }}
      run: anchor keys sync

    - name: Anchor build (testing)
      env:
        PATH: ${{ env.TOOLCHAIN_PATH }}:${{ env.PATH }}
      run: anchor build -- --features testing

    - name: Setup solana node
      env:
        PATH: ${{ env.TOOLCHAIN_PATH }}:${{ env.PATH }}
      run: |
        solana-test-validator --reset &
        echo "VALIDATOR_PID=$!" >> $GITHUB_ENV
        sleep 5

        mkdir -p ~/.config/solana/
        solana-keygen new --no-passphrase --outfile ~/.config/solana/hastra-localnet-id.json
        solana config set --url l
        solana config set --keypair ~/.config/solana/hastra-localnet-id.json
        solana airdrop 1000

    - name: Anchor test
      env:
        PATH: ${{ env.TOOLCHAIN_PATH }}:${{ env.PATH }}
      run: anchor test --skip-local-validator --skip-build

    - name: Stop local validator
      if: always()
      run: kill ${VALIDATOR_PID} 2>/dev/null || true

    - name: Anchor build vault_stake (production)
      env:
        PATH: ${{ env.TOOLCHAIN_PATH }}:${{ env.PATH }}
      run: anchor build --program-name vault_stake

    - name: Upload production program artifacts
      uses: actions/upload-artifact@v4
      with:
        name: program-builds-pr-${{ github.event.pull_request.number || github.run_id }}
        retention-days: 14
        path: |
          target/deploy/vault_mint.so
          target/deploy/vault_stake.so
          target/idl/vault_mint.json
          target/idl/vault_stake.json
          target/types/vault_mint.ts
          target/types/vault_stake.ts
